# .github/workflows/build.yml
name: Build Windows EXE
on: [push]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv run pyinstaller --onefile main.py
      - uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: dist/main.exe
