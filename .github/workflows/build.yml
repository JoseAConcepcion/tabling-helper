# .github/workflows/build.yml
name: Build and Release Windows EXE

on:
  push:
    tags:
      - 'v*' # Se activa cuando subes un tag como v1.0.0

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
          enable-cache: true

      # 1. Instalar dependencias usando sync (crea el venv automáticamente)
      - name: Install dependencies
        run: uv sync

      - name: Build Official Version
        run: >
          uv run pyinstaller --onefile --windowed --name "Horarios"
          --hidden-import "reportlab.graphics.barcode.code128"
          --hidden-import "reportlab.graphics.barcode.code39"
          --hidden-import "reportlab.graphics.barcode.code93"
          --hidden-import "reportlab.graphics.barcode.usps"
          src/main.py

      # 3. Build Versión DEBUG (Con consola)
      - name: Build Debug Version
        run: >
          uv run pyinstaller --onefile --console --name "Horarios-Debug"
          --hidden-import "reportlab.graphics.barcode.code128"
          --hidden-import "reportlab.graphics.barcode.code39"
          --hidden-import "reportlab.graphics.barcode.code93"
          --hidden-import "reportlab.graphics.barcode.usps"
          src/main.py

      # 4. Crear el Release en GitHub y subir ambos archivos
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/Horarios.exe
            dist/Horarios-Debug.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}